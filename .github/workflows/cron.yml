name: GitSync Cron

on:
  schedule:
    - cron: "0 */6 * * *"    # Sync every 6 hours
    - cron: "0 2 * * 0"      # Cleanup weekly on Sunday 2 AM
  workflow_dispatch:

jobs:
  sync:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync cron
        run: |
          curl -s -X POST "${API_BASE_URL}/api/cron/sync" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  cleanup:
    if: github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup cron
        run: |
          curl -s -X POST "${API_BASE_URL}/api/cron/cleanup" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
